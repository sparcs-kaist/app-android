name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  distribute:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "map_api_key=${{ secrets.MAP_API_KEY }}" >> local.properties
          echo "otl_sid_auth_token=${{ secrets.OTL_SID_AUTH_TOKEN }}" >> local.properties
          echo "KAKAO_MAP_KEY=${{ secrets.KAKAO_MAP_KEY }}" >> local.properties
          echo "KAKAO_NAVI_KEY=${{ secrets.KAKAO_NAVI_KEY }}" >> local.properties

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          STR_KEYSTORE: ${{ secrets.STR_KEYSTORE }}
        run: |
          echo "$STR_KEYSTORE" | base64 -di > app/buddy_appKey.jks

      - name: Build Release Bundle (app module)
        run: |
          ./gradlew app:bundleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/buddy_appKey.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_PASSWORD }} \
            --stacktrace
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Build Release APK (buddywatch module)
        run: |
          ./gradlew buddywatch:assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/buddy_appKey.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_PASSWORD }} \
            --stacktrace
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          author_name: "Android 빌드"
          fields: repo,message,commit,author,action,took
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}